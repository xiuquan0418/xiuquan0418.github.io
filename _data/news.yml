- date: Sep. 26, 2023
  headline: |
    <b>21st Annual Kincheloe Research Symposium Presentations!</b> |
    Our team members, Ross and Dania, will be presenting at the 21st Annual Kincheloe Research Symposium. 
    <b>Poster Session:</b> *Machine Learning Models to test Anomaly Detection* by Dwight Ross on <b>Friday, October 13th at 10:00 am</b>. |
    <b>Oral Sessions:</b> 
    *Predicting COVID-19 Cases Using Deep Neural Networks Based on Trends and Impact Survey Data* by Dania Zein on <b>Saturday, October 14th at 9:30 am</b> 
    *COVID-19 Detection from Chest X-rays with CNN-Based Approach* by Dwight Ross at <b>10:00 am</b>. 
    We encourage all group members to attend and support our speakers.
 
